name: AmorMiau Node.js CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  deploy_locally:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Start MongoDB
        uses: supercharge/mongodb-github-action@1.7.0
        with:
          mongodb-version: '5.0'

      - name: Prepare cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Create env file
        run: |
          touch .env
          echo JWT_SECRET=${{ secrets.JWT_SECRET }} > .env
          echo MONGODB_URL=${{ secrets.MONGODB_LOCAL }} >> .env
          echo ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} >> .env
          echo ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} >> .env
          echo ADMIN_PASSWORD_HASHED=${{ secrets.ADMIN_PASSWORD_HASHED }} >> .env
          echo ADMIN_ACCESS_TOKEN=${{ secrets.ADMIN_ACCESS_TOKEN }} >> .env

      - name: Install dependencies
        run: npm ci

      - name: test
        run: |
          echo Test Started!
          npm start &
          sleep 10 &&
          curl http://localhost:3000 &&
          npm test --ci server/tests/users.test.js && npm test --ci server/tests/cats.test.js

  deploy_heroku:
    needs: deploy_locally
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Use Node.js 24 LTS
        uses: actions/setup-node@v5
        with:
          node-version: 24.x

      - name: Prepare cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Create env file
        run: |
          touch .env
          echo JWT_SECRET=${{ secrets.JWT_SECRET }} > .env
          echo MONGODB_URL=${{ secrets.MONGODB }} >> .env
          echo ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }} >> .env
          echo ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }} >> .env
          echo ADMIN_PASSWORD_HASHED=${{ secrets.ADMIN_PASSWORD_HASHED }} >> .env
          echo ADMIN_ACCESS_TOKEN=${{ secrets.ADMIN_ACCESS_TOKEN }} >> .env

      - name: Install dependencies
        run: npm ci

      - name: Heroku deploy
        env:
          HEROKU_API_KEY: ${{ secrets.HEROKU_API_KEY }}
        run: |
          curl https://cli-assets.heroku.com/install-ubuntu.sh | sh
          heroku git:remote --app amormiau-backend
          git push heroku HEAD:main
